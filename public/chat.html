<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Interface</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <section id="doc-panel" class="panel">
            <h1>Document Management</h1>
            <form id="upload-form">
                <label class="form-label" for="file-input">Upload Document</label>
                <input type="file" id="file-input" />
                <button type="button" id="upload-btn">Upload</button>
            </form>
            <div class="uploaded-section">
                <h2>Uploaded Documents</h2>
                <p id="uploaded-docs" class="muted">No documents uploaded yet</p>
            </div>
            <div class="retrieval-section">
                <label class="form-label" for="retrieval-method">Retrieval Method</label>
                <select id="retrieval-method">
                    <option value="semantic">Semantic (Embeddings)</option>
                    <option value="tfidf">TF-IDF (Keyword)</option>
                </select>
            </div>
        </section>

        <section id="chat-container" class="panel">
            <header class="chat-header">
                <h1>AI Chat</h1>
            </header>
            <div id="messages" class="messages" aria-live="polite"></div>
            <form class="input-row" onsubmit="return false;">
                <label class="sr-only" for="user-input">Type a message</label>
                <input type="text" id="user-input" placeholder="Begin chatting..." autocomplete="off" />
                <button type="button" id="send-btn">Send</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
