<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Workflow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Study Workflow</h1>
  <p>Please complete the following steps in order.</p>

  <ol id="workflow-list">
    <li>
      <button id="survey-btn" class="workflow-btn">
        1. Complete the demographics questionnaire.
      </button>
    </li>
    <li>
      <button id="task-btn" class="workflow-btn" type="button">
        2. Read the task.
      </button>
    </li>
    <li>
      <button id="prototype-btn" class="workflow-btn" type="button">
        3. Use the AI system to complete the task.
      </button>
    </li>
  </ol>

  <script src="script.js"></script>
</body>
</html>
